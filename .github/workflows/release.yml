name: release
on:
  push:
    tags: ['v*']

# Builds three platform tarballs (macOS arm64 / Linux x86_64 / Windows
# x86_64) and creates a GitHub Release whose body is the section of
# CHANGELOG.md matching the tag's semver. The tag must be `vX.Y.Z` (or
# `vX.Y.Z-foo` for a prerelease — the workflow detects the hyphen and
# flags the release accordingly). Intel macOS users run the arm64
# binary under Rosetta 2; a dedicated x86_64-apple-darwin target is not
# shipped because `lance-linalg`'s build script hard-codes
# `-march=native` for AVX-512 codegen, which is incompatible with
# cross-compiling on the Apple Silicon runner.

env:
  CARGO_TERM_COLOR: always
  # Incremental compilation thrashes the cache (every commit produces a
  # new incremental dir) without helping CI, where the cache key is the
  # Cargo.lock hash, not the source.
  CARGO_INCREMENTAL: "0"
  # Pinned protoc release for the inline install step below. Bumping this
  # variable is the only place the workflow needs to learn a new version.
  PROTOC_VERSION: "35.0"

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runs-on: macos-14
            pdfium_archive: pdfium-mac-arm64.tgz
            pdfium_sha: 9acf49e46c68992cd40810e88264b1ad171805d02fd41c4cca336aad6653b333
            pdfium_path_in_archive: lib/libpdfium.dylib
            pdfium_lib_name: libpdfium.dylib
            archive_kind: tar.gz
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            pdfium_archive: pdfium-linux-x64.tgz
            pdfium_sha: e3f0c66b2daad710cb6c8edd4a8c45c8902995e359dc0775917fc16e2e56349d
            pdfium_path_in_archive: lib/libpdfium.so
            pdfium_lib_name: libpdfium.so
            archive_kind: tar.gz
          - target: x86_64-pc-windows-msvc
            # Pinned image; `windows-latest` is being redirected to
            # `windows-2025-vs2026` mid-June 2026, and an explicit pin
            # keeps tag-time builds reproducible across that transition.
            runs-on: windows-2025-vs2026
            pdfium_archive: pdfium-win-x64.tgz
            pdfium_sha: 45c4cc5d052ef8ec6380b946b548a76100f4675e38362000a4c732e16d5e8eda
            pdfium_path_in_archive: bin/pdfium.dll
            pdfium_lib_name: pdfium.dll
            archive_kind: zip
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      # Caches ~/.cargo/{registry,git} and target/. Key derives from
      # Cargo.lock + rustc + target triple + shared-key. Successive tags
      # (rc1 → rc2 → final) reuse the dependency-compilation tree.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      # Inline protoc install. arduino/setup-protoc still runs on Node 20
      # and has been unmaintained since early 2024; the official
      # protocolbuffers/protobuf release zips are tiny, fast, and host the
      # universal macOS binary so the same archive serves both Apple
      # targets. PATH is exported via $GITHUB_PATH so prost-build's
      # protoc lookup picks it up in the next step.
      - name: Install protoc
        shell: bash
        run: |
          set -euo pipefail
          case "${{ runner.os }}" in
            Linux)   archive="protoc-${PROTOC_VERSION}-linux-x86_64.zip" ;;
            macOS)   archive="protoc-${PROTOC_VERSION}-osx-universal_binary.zip" ;;
            Windows) archive="protoc-${PROTOC_VERSION}-win64.zip" ;;
            *) echo "::error::unsupported runner OS: ${{ runner.os }}" >&2; exit 1 ;;
          esac
          curl -L -o protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${archive}"
          mkdir -p "${RUNNER_TEMP}/protoc"
          unzip -q protoc.zip -d "${RUNNER_TEMP}/protoc"
          echo "${RUNNER_TEMP}/protoc/bin" >> "$GITHUB_PATH"

      - name: Cache PDFium archive
        # The cache key is tied to the pinned chromium build, so a hit
        # always carries the right ABI for the pdfium_NNNN cargo feature
        # in extract/Cargo.toml. Bump the key when PDFIUM_VERSION.md
        # bumps; otherwise stale binaries persist.
        id: pdfium-cache
        uses: actions/cache@v5
        with:
          path: pdfium-extracted
          key: pdfium-chromium-7763-${{ matrix.target }}

      - name: Fetch and verify PDFium
        if: steps.pdfium-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          curl -L -o pdfium.tgz \
            "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F7763/${{ matrix.pdfium_archive }}"
          # macOS ships shasum (Perl); Linux and Git Bash on Windows ship
          # sha256sum (coreutils). Pick whichever is on PATH.
          if command -v sha256sum >/dev/null 2>&1; then
            actual=$(sha256sum pdfium.tgz | awk '{print $1}')
          else
            actual=$(shasum -a 256 pdfium.tgz | awk '{print $1}')
          fi
          expected="${{ matrix.pdfium_sha }}"
          if [ "$actual" != "$expected" ]; then
            echo "::error::PDFium archive SHA mismatch: expected $expected, got $actual" >&2
            exit 1
          fi
          mkdir -p pdfium-extracted
          tar -xzf pdfium.tgz -C pdfium-extracted

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p bookrack-cli -p bookrack-mcp

      - name: Assemble release archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          stage="bookrack-${version}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"

          # macOS lays the binaries into a Bookrack.app bundle so the
          # tarball can be double-clicked; Windows and Linux keep the
          # flat layout and add a small launcher next to the binaries.
          if [ "${{ runner.os }}" = "macOS" ]; then
            payload_dir="dist/${stage}/Bookrack.app/Contents/Resources"
            macos_dir="dist/${stage}/Bookrack.app/Contents/MacOS"
            mkdir -p "${payload_dir}" "${macos_dir}"
          else
            payload_dir="dist/${stage}"
          fi

          # Native binaries
          bin_suffix=""
          if [ "${{ runner.os }}" = "Windows" ]; then bin_suffix=".exe"; fi
          cp "target/${{ matrix.target }}/release/bookrack${bin_suffix}" "${payload_dir}/"
          cp "target/${{ matrix.target }}/release/bookrack-mcp${bin_suffix}" "${payload_dir}/"

          # PDFium loaded by the adapter from the binary's own directory
          # when BOOKRACK_PDFIUM_LIB is unset, so place it beside the
          # binaries inside the tarball.
          cp "pdfium-extracted/${{ matrix.pdfium_path_in_archive }}" \
             "${payload_dir}/${{ matrix.pdfium_lib_name }}"

          # Project documentation and license
          cp LICENSE README.md CHANGELOG.md "${payload_dir}/"

          # PDFium upstream license (the archives ship one). The PDFium
          # static-link bundle (FreeType, LCMS2, libjpeg-turbo, libpng,
          # zlib, libtiff, OpenJPEG, etc.) is permissively licensed; the
          # archive's LICENSE file carries every required attribution.
          if [ -f pdfium-extracted/LICENSE ]; then
            cp pdfium-extracted/LICENSE "${payload_dir}/LICENSE-PDFIUM"
          fi

          # Platform launcher: each one is the double-click target the
          # user runs on a fresh install.
          case "${{ runner.os }}" in
            macOS)
              sed -e "s/__VERSION__/${version}/g" \
                packaging/macos/Info.plist \
                > "dist/${stage}/Bookrack.app/Contents/Info.plist"
              cp packaging/macos/bookrack-launcher "${macos_dir}/"
              cp packaging/macos/bookrack-run.command "${payload_dir}/"
              chmod 755 "${macos_dir}/bookrack-launcher" \
                "${payload_dir}/bookrack-run.command" \
                "${payload_dir}/bookrack" \
                "${payload_dir}/bookrack-mcp"
              # Ad-hoc sign so Gatekeeper sees a signature on the
              # bundle. No paid Developer ID; first launch still
              # requires right-click -> Open on a quarantined copy.
              codesign --force --deep --sign - "dist/${stage}/Bookrack.app"
              ;;
            Windows)
              cp "packaging/windows/Start Bookrack.cmd" "${payload_dir}/"
              ;;
            Linux)
              cp packaging/linux/bookrack.desktop "${payload_dir}/"
              ;;
          esac

          # Pack
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha_cmd="sha256sum"
          else
            sha_cmd="shasum -a 256"
          fi
          if [ "${{ matrix.archive_kind }}" = "zip" ]; then
            7z a "${stage}.zip" "${stage}" >/dev/null
            $sha_cmd "${stage}.zip" > "${stage}.zip.sha256"
          else
            tar -czf "${stage}.tar.gz" "${stage}"
            $sha_cmd "${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: bookrack-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  release:
    name: create-github-release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all platform artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Extract release notes for ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          # Capture the lines under `## [<version>] - <date>` up to (but
          # excluding) the next `## [...]` heading.
          awk -v ver="$version" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found = 1; next }
            }
            found
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::CHANGELOG.md has no '## [${version}]' section" >&2
            exit 1
          fi
          echo "--- RELEASE_NOTES.md ---"
          cat RELEASE_NOTES.md

      - name: Detect prerelease from tag
        id: kind
        shell: bash
        run: |
          # Semver prereleases carry a hyphen: v0.1.0-rc1, v0.2.0-beta.
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            ${{ steps.kind.outputs.flag }} \
            dist/*
