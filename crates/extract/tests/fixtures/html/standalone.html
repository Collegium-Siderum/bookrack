<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>A Standalone Synthetic Document</title>
  <meta name="author" content="Henry Htmlwright"/>
</head>
<body>
  <h1>Part One</h1>
  <p>The opening paragraph of a loose HTML document used for testing.</p>
  <h2>A Section</h2>
  <p>A paragraph inside the first section of the document.</p>
  <h3>A Subsection</h3>
  <p>A paragraph inside the subsection, one heading level deeper.</p>
  <h2>Another Section</h2>
  <p>The closing paragraph of the standalone document.</p>
