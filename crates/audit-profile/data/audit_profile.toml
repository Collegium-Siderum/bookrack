# Default audit profile shipped with bookrack.
#
# Schema-locked: every value is either a public constant or a boolean.
# The defaults reproduce the previous hard-coded audit behaviour
# exactly, so an install with no `audit_profile.local.toml` overlay
# sees no change from the pre-profile pipeline.
#
# A runtime overlay at `<data_root>/audit-rules/audit_profile.local.toml`
# is merged on top: any field present there overrides the default,
# missing fields fall through to the value declared here.
#
# This file is loaded through `include_str!` at build time. Do not
# remove fields; downstream code reads every key.

schema_version = 1

# Master switch. When false, the audit substep is skipped entirely:
# `node_reviews` is still written as `pending`, but no `MetadataReport`
# is produced and no audit-derived columns are filled.
audit_enabled = true

[year]
range_check = true
min = 1450
max = 2100
pdf_likely_file_date = true
timestamp_form = true
# B1 cross-field rule. When true, an extracted year whose `year_raw` is in
# timestamp shape and disagrees with the filename-derived year is dropped
# at base-attrs assembly so the filename year fills the slot.
cross_field_filename_override = true

[title]
placeholder_check = true
purely_numeric = true
# R-09 split into four named sub-rules. Each gates one detection path
# against the trimmed title; the current implementation routes all four
# through one combined detector pending the B1 §3.2 split.
series_paren = true
marketing_block = true
aggregator_marker = true
volume_marker = true
bracketed_min_chars = 3

[language]
bcp47_check = true
body_script_match = true
# Body / declared-language disagreement uses two coarse buckets and a
# small per-bucket ratio guard. Operators add more BCP-47 primary
# subtags to either list as the corpus expands.
cjk_codes = ["zh", "ja", "ko"]
latin_codes = ["en", "fr", "de", "es", "it", "pt", "nl", "sv", "no", "da", "fi", "pl", "ru"]
# Minimum CJK character ratio the body sample must clear when a CJK
# language is declared; below that and the latin ratio above
# `body_latin_min_ratio`, the audit flags `LangMismatchesBody`.
body_cjk_min_ratio = 0.1
body_latin_min_ratio = 0.6
# Maximum CJK character ratio allowed when a Latin-script language is
# declared; above this the audit flags the disagreement.
body_cjk_max_ratio = 0.4

[publisher]
url_watermark = true
whitelist_normalize_abbreviations = true
# B1 cross-field rule. When true, an extracted ISBN that fails the
# ISBN-10/13 checksum is dropped from base attrs so the filename ISBN
# fills the slot. Targets the ten-digit numeric fallback identifier
# some EPUB toolchains stamp into `<dc:identifier>` when no real ISBN
# is available.
drop_10digit_isbn_to_filename = true

[toc_shape]
suspicious_flat = true
flat_min_entries = 5
flat_severe_min_entries = 10
heading_block_skew = true
skew_min = 5
skew_ratio = 4
empty_large_body = true
large_body_min_blocks = 100

[source_prior]
enabled = true

[copyright_blocks]
enabled = true
count = 6

[filename_parser]
enabled = true
year_min = 1500
year_max = 2100

[extract]
# H-01: validate EPUB published-date year falls in `[year_min, year_max]`.
epub_year_range_check = true
epub_year_min = 1000
epub_year_max = 2200
# H-02: recognise ISBN inside dc:identifier and require 10/13 digits.
epub_isbn_recognition = true
# H-04: map MARC role codes (aut/trl/trc/edt) onto contributor roles.
# When false every contributor lands under `Other`.
marc_role_mapping = true
# H-05: emit Chinese chapter/volume markers as heading blocks.
txt_toc_enabled = true

[html]
# Tag lists the EPUB / HTML adapter's DOM walk consults. `block_tags`
# elements emit one [`Block`]; `skip_tags` subtrees carry no readable
# prose. Adding a tag here changes the block stream, which is
# stamped through `extractor_version`.
block_tags = [
    "p",
    "h1",
    "h2",
    "h3",
    "h4",
    "h5",
    "h6",
    "li",
    "blockquote",
    "figcaption",
    "pre",
    "td",
    "th",
    "dd",
    "dt",
    "caption",
    "div",
]
skip_tags = ["script", "style", "head", "nav", "template", "svg"]

[quality]
# PDF text-layer quality thresholds the extract / OCR gate consults.
# Calibrated against the spike's PDF corpus; tuning these values
# changes the verdict ladder and is stamped through `extractor_version`.
# Below this chars-per-page count the layer is judged a bare scan.
chars_per_page_ocr = 50.0
# Below this chars-per-page count the layer is judged sparse.
chars_per_page_doubt = 200.0
# Above this share of replacement characters (U+FFFD) the layer is
# routed to OCR as encoding corruption.
replacement_ocr = 0.05
# Above this share of Private Use Area code points the layer is
# routed to OCR as a broken font cmap.
pua_ocr = 0.10
# Above this share of PUA code points the layer is downgraded to
# Doubtful, even though the OCR threshold has not fired.
pua_doubt = 0.01
# Above this share of control characters the layer is routed to OCR.
control_ocr = 0.02
# Image-page share above which the layer is treated as a dual-layer
# scan and downgraded to Doubtful even when the text reads cleanly.
dual_layer = 0.5
# Share of CJK ideographs separated from the next ideograph by a space
# above which the layer is downgraded — clean CJK has no word spaces.
cjk_space_doubt = 0.02
