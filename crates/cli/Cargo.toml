[package]
name = "bookrack-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "bookrack"
path = "src/main.rs"

[dependencies]
bookrack-audit-profile = { path = "../audit-profile" }
bookrack-config = { path = "../config" }
bookrack-obs = { path = "../obs" }
bookrack-ingest = { path = "../ingest" }
bookrack-search = { path = "../search" }
bookrack-embed = { path = "../embed" }
bookrack-corpus = { path = "../corpus" }
bookrack-catalog = { path = "../catalog" }
bookrack-core = { path = "../core" }
bookrack-diagnose = { path = "../diagnose" }
bookrack-extract = { path = "../extract" }
bookrack-metadata = { path = "../metadata" }
bookrack-ops = { path = "../ops" }
bookrack-query = { path = "../query" }
bookrack-vectors = { path = "../vectors" }
clap.workspace = true
tokio.workspace = true
anyhow.workspace = true
tracing.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
fs2.workspace = true
# `bookrack init` writes a tempdir for the end-to-end smoke ingest, so
# the user's chosen data root stays untouched until validation passes.
tempfile.workspace = true
