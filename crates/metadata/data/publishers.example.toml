# Reputable-imprint whitelist for the metadata audit.
#
# Copy this file to `$BOOKRACK_DATA_DIR/audit-rules/publishers.toml`
# and edit in place. Bookrack does not ship a default list; matches
# strengthen the publisher field's grade, misses stay neutral.
#
# Matching is case-insensitive after a light normalisation pass that
# drops punctuation and expands a few common abbreviations
# (`Univ.` -> `university`, `Co.` -> `company`, `Intl` -> `international`).
# Any UTF-8 string is accepted; CJK or other non-Latin imprints are
# fine here.

schema_version = 1

whitelist = [
    "Acme University Press",
    "Sample Imprint Books",
]
