# Distribution-watermark token lists for the metadata audit.
#
# Copy this file to `$BOOKRACK_DATA_DIR/audit-rules/watermarks.toml`
# and edit in place. Bookrack does not ship default lists; any match
# downgrades the publisher field's grade two notches and flags it as
# a watermark.
#
# The sniffer also catches closed-form patterns that need no list:
# URLs, email addresses, and common top-level domain suffixes. Those
# patterns are gated by `audit_profile.publisher.url_watermark` in
# `crates/audit-profile/data/audit_profile.toml`; the four lists below
# are always consulted regardless of the toggle. This file is for
# token lists that evolve with the long tail of distribution channels.
#
# Matching against all four lists is case-insensitive substring on the
# input value. Use `\uXXXX` escapes (TOML basic strings) or natural
# UTF-8 for non-Latin tokens.

schema_version = 1

# Contact / chat channel handles.
contact_tokens = [
    "qq:",
    "telegram",
]

# Promotional or production verbs that signal a distribution channel.
promo_tokens = [
    "free ebook",
    "scanned by",
]

# ASCII brand handles of known distribution channels.
ascii_distribution_tokens = [
    # "acme-rip"
]

# Non-Latin fragments that mark watermarks, channel brands, or
# production-credit verbs occupying a publisher field. TOML basic
# strings accept `\uXXXX` escapes for ASCII-only source bytes, or
# raw UTF-8 if you prefer.
watermark_cjk_tokens = [
    # placeholder entry, edit or remove as needed
    # "\uXXXX\uXXXX..."
]

# Suffix tokens that mark a trailing bracketed segment as a volume /
# edition / printing marker rather than a series name or marketing
# block. Match is `ends_with` against the trimmed bracketed content,
# so both single-character and multi-character tokens work. Empty by
# default: every bracketed tail then routes through the series /
# marketing / aggregator branches only.
volume_suffix_tokens = [
    # Typical entries for CJK markets cover the volume / edition /
    # printing suffix characters at U+518C / U+7248 / U+672C; a
    # Japanese volume suffix sits at U+5DFB. Add the tokens your
    # collection actually uses; an empty list disables this signal.
    # "\uXXXX"
]
